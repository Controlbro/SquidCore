starting-balance: 0
currency-symbol: '$'
default-currency: money
max-money: 10000000000000
min-money: 0
economy-log-enabled: false
auto-save-interval-seconds: 300
online-shard-reward:
  enabled: true
  amount: 1
  interval-seconds: 60

currencies:
  Money:
    symbol: '$'
    command-alias: money
    starting-balance: 0
    max-money: 10000000000000
    min-money: 0
  Shards:
    symbol: '✦'
    command-alias: shards
    starting-balance: 0
    max-money: 10000000000000
    min-money: 0

mysql:
  enabled: false
  host: localhost
  port: 3306
  database: besteconomy
  username: "CHANGE_THIS_USERNAME"
  password: "CHANGE_THIS_PASSWORD"
  use-ssl: false
  connection-timeout-ms: 10000
  shard-balances:
    table: player_balances
    uuid-column: uuid
    currency-column: currency
    amount-column: amount
    currency-value: Shards

webshop:
  enabled: true
  pending-check-seconds: 60
  max-commands-per-check: 50
  api-key: "CHANGE_THIS_TO_A_LONG_RANDOM_SECRET"

blackjack:
  blackjack-payout-multiplier: "2.5"
  win-payout-multiplier: "2"
rtp:
  max-uses: 3
  range: 5000
  min-range: 0
  # Optional center coordinates. If omitted, the world's spawn location is used.
  # center:
  #   x: 0
  #   z: 0

  onboarding:
    join-screen:
      enabled: true
      title: "&6Welcome to SheepSquid"
      subtitle: "&7Please complete this simple tutorial before playing."
      title-sound: "ENTITY_PLAYER_LEVELUP"
      subtitle-sound: "BLOCK_NOTE_BLOCK_PLING"
  messages:
    no-permission: "&cYou do not have permission to use RTP."
    must-agree: "&cYou must use &e/agree &cbefore you can use &e/rtp&c."
    already-agreed: "&eYou already agreed. You can use &6/rtp &enormally."
    agreed: "&aThanks for agreeing! Using your first RTP now..."
    no-uses-left: "&cYou have used all of your RTPs. Ask an admin if you would like more."
    failed: "&cCould not find a safe RTP spot. Please try again later."
    success: "&aTeleported randomly! &7RTP uses remaining: &e%remaining%&7. Ask an admin if you need more."
    reset: "&aReset RTP uses for &e%player%&a."

links:
  discord:
    - "&bDiscord: https://discord.example.com"
  website:
    - "&bWebsite: https://www.example.com"
  bans:
    - "&bBans: https://bans.example.com"
  vote:
    - "&eVote Links:"
    - ""
    - "https://vote.com"
    - "https://vote.com"
    - "https://vote.com"
    - "https://vote.com"
    - ""
    - "&aVoting helps others find the server, and rewards you with $1000!"

webhooks:
  market-listings: ""
  bug-reports: ""

chat:
  formatting-enabled: true
  format: "{luckperms_prefix}&r{username}{tag} &7>> &f{message}"
  fallback-prefix: ""
  tags:
    member:
      display: "&7[Member]"
      permission: "besteconomy.tags.member"
