name: SquidCore
main: com.controlbro.besteconomy.BestEconomyPlugin
version: 2.7
api-version: '26.1.2'
author: Controlbro
softdepend: [Vault, PlaceholderAPI, CoreProtect]

commands:
  achievements:
    description: View your custom achievement progress.
    aliases: [ach]
    usage: /achievements
  eco:
    description: Admin economy command for Money and Shards.
    aliases: [economy]
    usage: /eco <give|take|reset|set> <player> <money|shards> [amount]
  balance:
    description: Check balance.
    aliases: [bal]
    usage: /balance
  baltop:
    description: View top Money balances.
    usage: /baltop [page]
  shardtop:
    description: View top Shards balances.
    usage: /shardtop [page]
  pay:
    description: Pay another player Money.
    usage: /pay <player> <amount>
  shardpay:
    description: Pay another player Shards.
    usage: /shardpay <player> <amount>
  sheepsquid:
    description: SheepSquid admin command.
    usage: /sheepsquid reload
  bugreport:
    description: Send a bug report to staff via Discord webhook.
    usage: /bugreport <bug text>
  shardshop:
    description: View or create your Shards webshop account.
    usage: /shardshop [create|resetpassword <newPassword>]
  shardannounce:
    description: Broadcast a custom shard shop purchase announcement.
    usage: /shardannounce <player> <item>
  shop:
    description: Open the Money GUI shop.
    usage: /shop
  sell:
    description: Open the item sell menu.
    usage: /sell
  values:
    description: View sell values.
    usage: /values [page]
  shopadmin:
    description: Webshop administration command.
    usage: /shopadmin processpending
  market:
    description: Open or manage the player market.
    usage: /market [create|name|manage|search]
  givemarketslots:
    description: Give a player more market listing slots.
    usage: /givemarketslots <player> <amount>
  mines:
    description: Play Mines with Shards.
    usage: /mines <amount>
  bj:
    description: Play Blackjack with Shards.
    aliases: [blackjack]
    usage: /bj <amount>
  coinflip:
    description: Create or join Shards coinflips.
    aliases: [cf]
    usage: /coinflip <create|join|cancel|list>
  settings:
    description: Open the server settings menu.
    usage: /settings
  tags:
    description: Open the chat tags GUI.
    usage: /tags
  givetag:
    description: Give a chat tag to a player.
    usage: /givetag <tag> <player>
  vanish:
    description: Toggle invisibility from other players and the tab list.
    aliases: [v]
    usage: /vanish
  gamemode:
    description: Change your game mode.
    aliases: [gm]
    usage: /gamemode <survival|creative|spectator|adventure>
  gms:
    description: Change your game mode to survival.
    usage: /gms
  gmc:
    description: Change your game mode to creative.
    usage: /gmc
  gmsp:
    description: Change your game mode to spectator.
    usage: /gmsp
  gma:
    description: Change your game mode to adventure.
    usage: /gma
  lock:
    description: Toggle locking mode for containers and doors.
    usage: /lock

  unlock:
    description: Toggle unlocking mode for protections.
    usage: /unlock
  trust:
    description: Trust a player on selected protections.
    usage: /trust <player>
  trustall:
    description: Trust a player on all current and future protections.
    usage: /trustall <player>
  rtp:
    description: Randomly teleport up to the configured use limit.
    usage: /rtp
  resetrtp:
    description: Reset a player's RTP uses.
    usage: /resetrtp <player>
  agree:
    description: Accept onboarding and use your first RTP.
    usage: /agree
  setonboardingspawn:
    description: Set the onboarding spawnpoint for new players.
    usage: /setonboardingspawn
  onboardingtest:
    description: Reset yourself into onboarding mode for testing.
    usage: /onboardingtest
  discord:
    description: View the server Discord link.
    usage: /discord
  web:
    description: View the server website link.
    aliases: [website]
    usage: /web
  bans:
    description: View the server bans link.
    usage: /bans
  vote:
    description: View the server vote links.
    usage: /vote
  sethome:
    description: Set a named home at your current location.
    usage: /sethome [name]
  home:
    description: Teleport to one of your homes.
    usage: /home [name]
  homes:
    description: List your homes and home slots.
    usage: /homes
  delhome:
    description: Delete one of your homes.
    usage: /delhome <name>
  givehomes:
    description: Grant additional home slots to a player.
    usage: /givehomes <player> <amount>
  tpa:
    description: Request to teleport to another player.
    usage: /tpa <player>
  tpahere:
    description: Request another player teleport to you.
    usage: /tpahere <player>
  tpaccept:
    description: Accept an incoming teleport request.
    usage: /tpaccept
  tpdeny:
    description: Deny an incoming teleport request.
    usage: /tpdeny
  back:
    description: Return to your previous teleport/death location.
    usage: /back

permissions:
  besteconomy.eco.give:
    description: Allows giving Money or Shards.
    default: op
  besteconomy.eco.take:
    description: Allows taking Money or Shards.
    default: op
  besteconomy.eco.reset:
    description: Allows resetting Money or Shards.
    default: op
  besteconomy.eco.set:
    description: Allows setting Money or Shards balances.
    default: op
  besteconomy.balance:
    description: Allows checking own balance.
    default: true
  besteconomy.balance.others:
    description: Legacy permission retained; balance commands now show only your own balance.
    default: op
  besteconomy.baltop:
    description: Allows viewing baltop.
    default: true
  besteconomy.pay:
    description: Allows paying other players.
    default: true
  shop.values.use:
    description: Allows opening the values GUI.
    default: true
  besteconomy.reload:
    description: Allows reloading the plugin.
    default: op
  shop.account.use:
    description: Allows creating a webshop account.
    default: true
  shop.account.reset:
    description: Allows resetting your webshop password.
    default: true
  shop.admin:
    description: Allows managing webshop pending commands.
    default: op
  shop.gui.use:
    description: Allows using the Money GUI shop.
    default: true
  shop.sell.use:
    description: Allows using the sell menu.
    default: true
  besteconomy.market.use:
    description: Allows using the player market.
    default: true
  besteconomy.market.giveslots:
    description: Allows giving market listing slots.
    default: op
  besteconomy.mines.use:
    description: Allows playing Mines with Shards.
    default: true
  besteconomy.blackjack.use:
    description: Allows playing Blackjack with Shards.
    default: true
  besteconomy.coinflip.use:
    description: Allows creating and joining coinflips with Shards.
    default: true
  besteconomy.settings.use:
    description: Allows opening the settings menu.
    default: true
  besteconomy.vanish.use:
    description: Allows toggling vanish.
    default: op
  besteconomy.vanish.see:
    description: Allows seeing vanished and spectator players.
    default: op
  besteconomy.gamemode.survival:
    description: Allows changing to survival mode.
    default: op
  besteconomy.gamemode.creative:
    description: Allows changing to creative mode.
    default: op
  besteconomy.gamemode.spectator:
    description: Allows changing to spectator mode.
    default: op
  besteconomy.gamemode.adventure:
    description: Allows changing to adventure mode.
    default: op
  besteconomy.tags.give:
    description: Allows giving chat tags to players.
    default: op
  besteconomy.lock.use:
    description: Allows locking containers and doors.
    default: true
  besteconomy.lock.bypass:
    description: Allows bypassing locked containers and doors.
    default: op
  besteconomy.onboarding.test:
    description: Allows running onboarding test mode.
    default: op
  besteconomy.rtp.use:
    description: Allows using random teleport.
    default: true
  besteconomy.rtp.reset:
    description: Allows resetting a player's RTP uses.
    default: op
  besteconomy.onboarding.setspawn:
    description: Allows setting the onboarding spawnpoint.
    default: op

  besteconomy.home.use:
    description: Allows players to use home commands.
    default: true
  besteconomy.home.give:
    description: Allows granting extra home slots.
    default: op

  besteconomy.tab.prefix.owner:
    description: Shows the Owner prefix in the configured tab list.
    default: op
  besteconomy.tab.prefix.admin:
    description: Shows the Admin prefix in the configured tab list.
    default: op
  besteconomy.tab.prefix.mod:
    description: Shows the Mod prefix in the configured tab list.
    default: op
